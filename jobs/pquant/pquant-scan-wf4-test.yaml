apiVersion: batch/v1
kind: Job
metadata:
  name: pquant-scan-wf4-test
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        mount-eos: "true"
        mount-cvmfs: "true"
        home: "eos"
        mount-afs: "true"
    spec:
      nodeSelector:
       # nvidia.com/gpu.product: NVIDIA-H100-NVL
      containers:
      - name: pquant-scan-wf4-test
        image: registry.cern.ch/ngt/pytorch:2.3.1
        command:
        - "bash"
        - "-c"
        - |
          set -o pipefail &&
          source /eos/home-m/majorgen/miniconda3/etc/profile.d/conda.sh &&
          conda activate torch_env &&
          cd /eos/home-m/majorgen/particle_transformer &&
          export KERAS_BACKEND=torch &&
          export WEIGHT_F_BITS=4 &&
          export WANDB_API_KEY=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 &&
          OUTDIR=/eos/home-m/majorgen/particle_transformer/testing/JetClass/scan_wf4_$(date +%Y%m%d_%H%M) &&
          mkdir -p $OUTDIR &&
          weaver \
            --predict \
            --data-test "/eos/home-m/majorgen/particle_transformer/datasets/JetClass/Pythia/test_20M/*.root" \
            --data-config /eos/home-m/majorgen/particle_transformer/data/JetClass/JetClass_full.yaml \
            --network-config /eos/home-m/majorgen/particle_transformer/networks/ParticleTransformerWrapper_pquant_quant_infer_df11.py \
            --model-prefix "/eos/home-m/majorgen/particle_transformer/pquant_experiments/results/quant_scan_wf4/final_model.pt" \
            --predict-output $OUTDIR/pred.root \
            --num-workers 0 \
            --gpus 0 \
            2>&1 | tee $OUTDIR/test.log &&
          python3 pquant_experiments/test_analysis_wandb.py \
            --pred-root $OUTDIR/pred.root \
            --wandb-run-id vmuhbynl \
            2>&1 | tee -a $OUTDIR/test.log
        resources:
          limits:
            nvidia.com/gpu: 1
      restartPolicy: Never
